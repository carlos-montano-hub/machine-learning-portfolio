services:
  postgres:
    image: postgres:16
    container_name: bda_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: postgres_pass
      POSTGRES_DB: olist
    ports:
      - "5435:5432"
    volumes:
      - postgres16_data:/var/lib/postgresql/data

  doris:
    image: yagagagaga/doris-standalone
    container_name: doris
    privileged: true
    ports:
      - "8030:8030"
      - "8040:8040"
      - "9030:9030"

volumes:
  postgres16_data:
